<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Back button */
    .buttons {
      position: absolute;
      top: 15px;
      left: 15px;
      margin: 0;
      z-index: 1000;
    }
    .button-link {
      background-color: #2a7ae2;
      color: white;
      padding: 8px 15px;
      text-decoration: none;
      border-radius: 5px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .button-link:hover {
      background-color: #1a5dc0;
    }
    /* Navbar */
    .navbar {
      background-color: #1e293b;
      padding: 15px 40px;
      display: flex;
      justify-content: flex-end; /* Right align links */
      align-items: center;
      color: white;
    }
    .navbar nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
    }
    .navbar nav a:hover {
      text-decoration: underline;
    }
    /* Hero section */
    .hero {
      background: white;
      margin: 80px auto;
      padding: 40px;
      width: 350px;
      text-align: center;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }
    .hero h2 {
      color: #b44c74;
      margin-bottom: 20px;
    }
    .auth-form input[type="email"],
    .auth-form input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    .auth-form button {
      width: 100%;
      padding: 12px;
      background-color: #1a5dc0;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s ease;
    }
    .auth-form button:hover {
      background-color: #a03e64;
    }
 </style>
</head>
<body>
  <!-- Back to Home -->
  <div class="buttons">
    <a href="index.html" class="button-link">Home</a>
  </div>
  <!-- Navbar -->
  <header class="navbar">
    <nav>
      <a href="signup.html" class="button-link">SignUp</a>
    </nav>
    </header> 
  <!-- Login Section -->
  <section class="hero">
    <h2>Welcome to Startup Finder</h2>
    <form class="auth-form" id="loginForm">
      <input type="email" id="loginEmail"placeholder="Email" required />
      <input type="password"id="loginPassword" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <h2> No account? <a href="signup.html"> Sign up free</a></h2>
  </section>
  <script>
    document.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const email =
        document.getElementById("loginEmail").value;

    const password =
        document.getElementById("loginPassword").value;

    try {

        const res = await fetch(
            "http://localhost:5000/api/users/login",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data = await res.json();

        if(res.ok){

            // SAVE USER IN LOCAL STORAGE (IMPORTANT)
            localStorage.setItem(
                "user",
                JSON.stringify(data.user)
            );
            localStorage.setItem(
                 "token",
                 data.token
            );
            alert("Login Successful");

            // GO TO DASHBOARD
            window.location.href = "dashboard.html";
        } else {
            alert(data.message);
        }

    } catch (error) {
        console.log(error);
        alert("Server error");
    }

});
</script>
 </body>
</html>
